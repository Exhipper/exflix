<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Account Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .header-font { font-family: 'Space Grotesk', sans-serif; }

        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
        }

        .step {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .success-pulse {
            animation: successPulse 2s ease-in-out;
        }

        @keyframes successPulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen">
    <div class="max-w-2xl mx-auto p-8">
        <div class="flex items-center gap-4 mb-10">
            <div class="w-12 h-12 bg-gradient-to-br from-rose-500 to-pink-600 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-shield-halved text-white text-3xl"></i>
            </div>
            <div>
                <h1 class="header-font text-4xl font-semibold tracking-tighter">Account Validation Center</h1>
                <p class="text-slate-400">Enterprise Netflix Cookie Validator</p>
            </div>
        </div>

        <div class="glass rounded-3xl p-10 border border-slate-700/50">
            <h2 class="text-2xl font-semibold mb-6">Single Cookie (Manual Paste)</h2>
            
            <form id="addForm" class="space-y-8">
                <div>
                    <label class="block text-sm text-slate-400 mb-3">COOKIE CONTENT</label>
                    <textarea id="cookie_text" rows="8"
                        class="w-full bg-zinc-900 border border-slate-700 rounded-2xl p-6 text-sm font-mono focus:border-rose-500 focus:ring-rose-500 transition-all"
                        placeholder="Paste full NetflixId=... or Netscape format here"></textarea>
                </div>

                <button type="submit"
                    class="w-full py-6 bg-gradient-to-r from-rose-600 to-pink-600 hover:from-rose-500 hover:to-pink-500 rounded-2xl font-semibold text-lg flex items-center justify-center gap-3 transition-all active:scale-[0.985]">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>VALIDATE &amp; ADD ACCOUNT</span>
                </button>
            </form>

            <!-- Progress / Result Area -->
            <div id="result" class="hidden mt-8"></div>
        </div>

        <div class="text-center text-xs text-slate-500 mt-8">
            All cookies are validated against Netflix servers before being stored.
        </div>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const cookie = document.getElementById('cookie_text').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = `
                <div class="step glass rounded-2xl p-8 border border-slate-700">
                    <div class="flex items-center gap-4 text-amber-400">
                        <i class="fa-solid fa-spinner fa-spin text-2xl"></i>
                        <span class="font-medium">Validating cookie with Netflix servers...</span>
                    </div>
                </div>`;

            try {
                const res = await fetch('/api/add_account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cookie_text: cookie })
                });

                const data = await res.json();

                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success-pulse glass rounded-2xl p-8 border border-emerald-500 bg-emerald-900/30">
                            <div class="flex items-center gap-4 text-emerald-400 mb-6">
                                <i class="fa-solid fa-circle-check text-4xl"></i>
                                <div>
                                    <div class="text-2xl font-semibold">Account Successfully Validated</div>
                                    <div class="text-emerald-300">${data.message || 'Cookie has been stored securely.'}</div>
                                </div>
                            </div>
                            <div class="text-xs text-slate-400 border-t border-emerald-900 pt-4">
                                Account ID: #${Date.now().toString().slice(-6)} • Status: ACTIVE
                            </div>
                        </div>`;
                } else {
                    resultDiv.innerHTML = `
                        <div class="glass rounded-2xl p-8 border border-red-500 bg-red-900/20">
                            <div class="flex items-center gap-4 text-red-400">
                                <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
                                <div class="font-medium">${data.error || 'Validation failed'}</div>
                            </div>
                        </div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `
                    <div class="glass rounded-2xl p-8 border border-red-500 bg-red-900/20">
                        <div class="text-red-400">Network Error: ${err.message}</div>
                    </div>`;
            }
        });
    </script>
</body>
</html>
