<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Netflix Accounts</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
    <div class="max-w-2xl mx-auto p-8">
        <h1 class="text-3xl font-bold mb-8">Single Cookie (Manual Paste)</h1>
        
        <form id="addForm" class="space-y-6">
            <div>
                <label class="block text-sm mb-2">Cookie Content</label>
                <textarea id="cookie_text" rows="10" 
                          class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl p-5 text-sm font-mono resize-y"
                          placeholder="Paste NetflixId=... or full Netscape format here"></textarea>
            </div>
            
            <button type="submit"
                    class="w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-medium text-lg flex items-center justify-center gap-2">
                🔒 Validate & Add Single Account
            </button>
        </form>

        <div id="result" class="mt-6 hidden"></div>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cookie = document.getElementById('cookie_text').value.trim();
            const resultDiv = document.getElementById('result');

            resultDiv.classList.add('hidden');

            try {
                const res = await fetch('/api/add_account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cookie_text: cookie })
                });

                const data = await res.json();

                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="p-6 bg-emerald-900/50 border border-emerald-500 rounded-2xl">
                            <p class="text-emerald-400 text-xl mb-4">✅ Account validated and added!</p>
                            <p class="text-zinc-300">${data.message || ''}</p>
                        </div>`;
                } else {
                    resultDiv.innerHTML = `
                        <div class="p-6 bg-red-900/50 border border-red-500 rounded-2xl">
                            <p class="text-red-400">${data.error || 'Failed to add account'}</p>
                        </div>`;
                }
                resultDiv.classList.remove('hidden');
            } catch (err) {
                resultDiv.innerHTML = `
                    <div class="p-6 bg-red-900/50 border border-red-500 rounded-2xl">
                        <p class="text-red-400">Network error: ${err.message}</p>
                    </div>`;
                resultDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
