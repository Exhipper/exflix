<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COOKIE VAULT • VALIDATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #020617; }
        .header-font { font-family: 'Space Grotesk', sans-serif; }

        .glass { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(103, 232, 249, 0.3); 
        }
        .neon-cyan { 
            box-shadow: 0 0 20px #67e8f9, 
                        0 0 35px #22d3ee; 
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">
    <div class="max-w-3xl mx-auto px-6 py-12">
        <div class="flex items-center gap-4 mb-12">
            <div class="w-14 h-14 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-3xl flex items-center justify-center neon-cyan">
                <i class="fa-solid fa-microchip text-white text-3xl"></i>
            </div>
            <h1 class="header-font text-5xl font-bold tracking-tighter">COOKIE VALIDATOR</h1>
        </div>

        <div class="glass rounded-3xl p-10 neon-cyan">
            <form id="addForm">
                <div class="mb-6">
                    <label class="block text-xs tracking-widest text-cyan-400 mb-3">INSERT COOKIE DATA</label>
                    <textarea id="cookie_text" rows="10" 
                        class="w-full bg-black/80 border border-slate-700 rounded-2xl p-6 font-mono text-sm focus:border-cyan-400"
                        placeholder="Paste NetflixId=... or full Netscape/JSON format here..."></textarea>
                </div>

                <button type="submit"
                    class="w-full py-7 bg-gradient-to-r from-cyan-500 to-blue-500 text-black font-bold rounded-2xl text-xl hover:brightness-110 transition-all">
                    INITIATE VERIFICATION
                </button>
            </form>

            <div id="result" class="mt-8 min-h-[140px]"></div>
        </div>
    </div>

    <script>
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cookie = document.getElementById('cookie_text').value.trim();
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = `
                <div class="glass rounded-2xl p-8 border border-cyan-400">
                    <div class="flex items-center gap-4 text-cyan-400">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                        <span>Validating with Netflix servers...</span>
                    </div>
                </div>`;

            try {
                const res = await fetch('/api/add_account', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cookie_text: cookie})
                });
                const data = await res.json();

                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="glass rounded-2xl p-8 border border-emerald-400 bg-emerald-900/30">
                            <i class="fa-solid fa-circle-check text-4xl text-emerald-400 mb-4"></i>
                            <div class="text-2xl font-bold text-emerald-400">VALIDATION SUCCESSFUL</div>
                            <p class="text-slate-300 mt-2">${data.message || 'Account successfully added to vault.'}</p>
                        </div>`;
                } else {
                    resultDiv.innerHTML = `<div class="text-red-400 p-6 border border-red-500 rounded-2xl">❌ ${data.error}</div>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="text-red-400 p-6">Network Error. Please try again.</div>`;
            }
        });
    </script>
</body>
</html>
