<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXFLIX // ADMIN TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=VT323&display=swap');
        
        body { 
            font-family: 'Inter', system_ui, sans-serif; 
            background: #020617; 
            color: #e0f2fe; 
        }
        .header-font { font-family: 'Space Grotesk', 'VT323', sans-serif; }
        .mono { font-family: 'VT323', 'Courier New', monospace; }
        
        #matrix { 
            position: fixed; top: 0; left: 0; z-index: -1; 
            opacity: 0.55; pointer-events: none; 
        }
        
        .glass { 
            background: rgba(15,23,42,0.88); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(103,232,249,0.3); 
        }
        .neon-green { box-shadow: 0 0 15px #00ff9f, 0 0 35px #00ff9f; }
        .scanline::after { 
            content:''; position:absolute; inset:0; 
            background:linear-gradient(transparent 50%, rgba(0,255,159,0.07) 50%); 
            background-size:100% 5px; 
            animation:scan 3.5s linear infinite; 
            pointer-events:none; 
        }
        @keyframes scan { 0%{transform:translateY(-100%)} 100%{transform:translateY(400%)} }
        
        .terminal { 
            font-family:'VT323', monospace; 
            background:rgba(0,0,0,0.65); 
            border:1px solid #00ff9f33; 
        }
        
        #intrusion-log {
            position: fixed; bottom: 20px; left: 20px; width: 380px; height: 160px;
            background: rgba(0,0,0,0.9); border: 1px solid #00ff9f33; overflow: hidden; 
            font-size: 13px; line-height: 1.35; padding: 12px; color: #00ff9f; z-index: 50;
        }
        #log-content { animation: scrollLog 28s linear infinite; white-space: pre-wrap; }
        @keyframes scrollLog { 0% { transform: translateY(0); } 100% { transform: translateY(-100%); } }
        
        .particle { position: absolute; width: 4px; height: 4px; background: #00ff9f; border-radius: 50%; pointer-events: none; z-index: 60; animation: particleFade 1.2s forwards; }
        @keyframes particleFade { to { opacity: 0; transform: scale(0); } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <!-- INTRUSION LOG -->
    <div id="intrusion-log" class="terminal rounded-2xl hidden lg:block">
        <div class="text-xs text-red-400 mb-1 flex items-center gap-2">
            <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
            INTRUSION LOGS • LIVE
        </div>
        <div id="log-content" class="mono text-xs overflow-hidden h-[120px]"></div>
    </div>
    
    <div class="max-w-6xl mx-auto px-6 py-10 relative z-10">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-black border border-[#00ff9f] rounded-2xl flex items-center justify-center neon-green">
                    <i class="fa-solid fa-user-secret text-[#00ff9f] text-3xl"></i>
                </div>
                <div>
                    <h1 class="header-font text-5xl font-bold tracking-[-2px]">ADMIN TERMINAL</h1>
                    <p class="text-[#00ff9f] text-sm tracking-[3px] mono">EXFLIX VAULT CONTROL • NODE 01</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- INTENSITY TOGGLE -->
                <div onclick="toggleMatrixIntensity()" 
                     class="cursor-pointer flex items-center gap-2 text-xs mono bg-black/70 px-5 py-2.5 rounded-2xl border border-[#00ff9f33] hover:border-[#00ff9f]">
                    <i class="fa-solid fa-adjust"></i>
                    <span id="intensity-label">INTENSITY: HIGH</span>
                </div>
                
                <a href="/" class="px-6 py-3 border border-[#00ff9f33] hover:bg-[#00ff9f11] rounded-2xl text-sm flex items-center gap-2">
                    <i class="fa-solid fa-arrow-left"></i> DASHBOARD
                </a>
            </div>
        </div>
        
        <!-- ADD COOKIE SECTION -->
        <div class="glass rounded-3xl p-9 scanline mb-10 neon-green">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-plus text-[#00ff9f]"></i> INJECT NEW ACCOUNT
            </h2>
            <form id="addForm">
                <textarea id="cookie_text" rows="9" 
                    class="terminal w-full rounded-2xl p-7 font-mono text-sm focus:outline-none resize-y"
                    placeholder="Paste full Netflix cookie..."></textarea>
                <button type="submit" 
                    class="mt-5 w-full py-6 bg-[#00ff9f] hover:bg-white text-black font-extrabold text-xl rounded-2xl transition-all">
                    VALIDATE &amp; INJECT TO VAULT
                </button>
            </form>
            <div id="result" class="mt-6"></div>
        </div>
        
        <!-- VAULT INVENTORY -->
        <div class="glass rounded-3xl p-9">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold flex items-center gap-3">
                    <i class="fa-solid fa-database text-[#67e8f9]"></i> 
                    VAULT INVENTORY <span id="hacked-counter" class="ml-4 text-xs bg-red-500/20 text-red-400 px-3 py-1 rounded-full mono">HACKED: 47</span>
                </h2>
                <div class="flex gap-3">
                    <input id="search" type="text" placeholder="Filter nodes..." 
                           class="terminal px-5 py-2 rounded-2xl text-sm w-72 focus:outline-none" onkeyup="filterTable()">
                    <button onclick="loadAccounts()" 
                        class="px-6 py-2 border border-[#00ff9f33] hover:bg-[#00ff9f11] rounded-2xl text-sm flex items-center gap-2">
                        <i class="fa-solid fa-sync"></i> REFRESH
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm mono">
                    <thead>
                        <tr class="text-left text-[#00ff9f] text-xs tracking-widest border-b border-white/10">
                            <th class="py-4">ID</th>
                            <th>ADDED</th>
                            <th>LAST USED</th>
                            <th>USES</th>
                            <th>STATUS</th>
                            <th class="text-right">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="accounts-table" class="text-slate-300"></tbody>
                </table>
            </div>
            <div id="empty-state" class="hidden text-center py-16 text-slate-400">
                <i class="fa-solid fa-folder-open text-5xl mb-4"></i>
                <p class="text-lg">Vault empty. Inject cookies above.</p>
            </div>
        </div>
    </div>
    
    <script>
        // MATRIX RAIN + MOUSE INTERACTION
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let cols, drops = [], fontSize = 15, speed = 1.1, intensity = 0.55;
        
        function resizeMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / fontSize);
            drops = Array(cols).fill(1);
        }
        window.addEventListener('resize', resizeMatrix);
        resizeMatrix();
        
        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.085)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00ff9f';
            ctx.font = fontSize + 'px VT323';
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (Math.random() > 0.9) ctx.fillStyle = '#67e8f9';
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i] += speed;
            }
        }
        setInterval(drawMatrix, 42);
        
        // Mouse particle effect + slight rain influence
        document.addEventListener('mousemove', (e) => {
            createParticles(e.clientX, e.clientY, 6);
            
            // subtle mouse influence on rain speed/position
            if (Math.random() > 0.7) speed = 1.8;
            setTimeout(() => { speed = 1.1; }, 400);
        });
        
        function createParticles(x, y, count) {
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.transform = `translate(${Math.random()*20-10}px, ${Math.random()*20-10}px)`;
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1500);
            }
        }
        
        // Intensity toggle
        let currentIntensity = 0.55;
        function toggleMatrixIntensity() {
            const label = document.getElementById('intensity-label');
            if (currentIntensity === 0.55) {
                currentIntensity = 0.25; intensity = 0.25;
                label.textContent = "INTENSITY: LOW";
            } else if (currentIntensity === 0.25) {
                currentIntensity = 0.9; intensity = 0.9;
                label.textContent = "INTENSITY: MAX";
            } else {
                currentIntensity = 0.55; intensity = 0.55;
                label.textContent = "INTENSITY: HIGH";
            }
            canvas.style.opacity = intensity;
        }
        
        // Fake intrusion logs
        const logs = [
            "[10:24] TRACE FROM 172.XX.XX.XX - SPOOFED",
            "[10:25] COOKIE INJECTION SUCCESS - NODE #23",
            "[10:26] SESSION BREACH ACTIVE - 4 DEVICES",
            "[10:27] VAULT INTEGRITY 98.4%",
            "[10:28] NEW ACCOUNT VALIDATED",
            "[10:29] POTENTIAL HONEYPOT TRIGGERED"
        ];
        let logIndex = 0;
        function updateLogs() {
            const content = document.getElementById('log-content');
            content.innerHTML = logs.slice(logIndex).join('\n') + '\n' + logs.slice(0, logIndex).join('\n');
            logIndex = (logIndex + 1) % logs.length;
        }
        setInterval(updateLogs, 2200);
        updateLogs();
        document.getElementById('intrusion-log').classList.remove('hidden');
        
        // Real-time hacked counter (fake)
        let hackedCount = 47;
        setInterval(() => {
            hackedCount += Math.floor(Math.random() * 3) + 1;
            const counter = document.getElementById('hacked-counter');
            if (counter) counter.textContent = `HACKED: ${hackedCount}`;
        }, 4500);
        
        // ==================== FORM & TABLE LOGIC ====================
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const cookie = document.getElementById('cookie_text').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = `<div class="terminal p-6 flex items-center gap-4"><i class="fa-solid fa-spinner fa-spin"></i> VALIDATING ON EDGE NODES...</div>`;
            
            try {
                const res = await fetch('/api/add_account', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cookie_text: cookie})
                });
                const data = await res.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `<div class="terminal border border-emerald-400 p-6 text-emerald-400">✓ INJECTED SUCCESSFULLY</div>`;
                    document.getElementById('cookie_text').value = '';
                    loadAccounts();
                } else {
                    resultDiv.innerHTML = `<div class="terminal border border-red-500 p-6 text-red-400">✗ ${data.error}</div>`;
                }
            } catch(err) {
                resultDiv.innerHTML = `<div class="terminal border border-red-500 p-6">NETWORK BREACH FAILED</div>`;
            }
        });
        
        async function loadAccounts() {
            const tbody = document.getElementById('accounts-table');
            tbody.innerHTML = `<tr><td colspan="6" class="p-12 text-center mono">LOADING VAULT NODES...</td></tr>`;
            
            try {
                const res = await fetch('/api/accounts');
                const data = await res.json();
                
                if (!data.success || !data.accounts || data.accounts.length === 0) {
                    tbody.innerHTML = '';
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }
                document.getElementById('empty-state').classList.add('hidden');
                
                tbody.innerHTML = '';
                data.accounts.forEach(acc => {
                    const row = document.createElement('tr');
                    row.className = 'border-b border-white/10 hover:bg-white/5 transition-colors';
                    const status = acc.is_active ? 
                        `<span class="inline-block px-4 py-1 bg-emerald-500/20 text-emerald-400 rounded-full text-xs">ACTIVE</span>` : 
                        `<span class="inline-block px-4 py-1 bg-red-500/20 text-red-400 rounded-full text-xs">OFFLINE</span>`;
                    
                    row.innerHTML = `
                        <td class="py-5 text-[#67e8f9]">${acc.id}</td>
                        <td class="text-xs">${new Date(acc.added_at).toLocaleDateString()}</td>
                        <td class="text-xs">${acc.last_used ? new Date(acc.last_used).toLocaleDateString() : '—'}</td>
                        <td class="font-bold">${acc.usage_count}</td>
                        <td>${status}</td>
                        <td class="text-right">
                            ${acc.is_active ? `<button onclick="deactivateAccount(${acc.id}, this)" class="px-5 py-1.5 text-xs border border-red-400/60 hover:bg-red-900/30 rounded-xl text-red-400">DEACTIVATE</button>` : '—'}
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch(e) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-red-400 text-center">Failed to load vault</td></tr>`;
            }
        }
        
        async function deactivateAccount(id, btn) {
            if (!confirm('Deactivate node?')) return;
            btn.disabled = true;
            btn.textContent = 'TERMINATING...';
            
            try {
                await fetch(`/api/deactivate/${id}`, { method: 'POST' });
                loadAccounts();
            } catch(e) {}
        }
        
        function filterTable() {
            const term = document.getElementById('search').value.toLowerCase().trim();
            document.querySelectorAll('#accounts-table tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        }
        
        // Boot
        window.onload = loadAccounts;
        setInterval(loadAccounts, 35000); // auto refresh
    </script>
</body>
</html>
