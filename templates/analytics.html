<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics • Premium Account Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200">
    <div class="max-w-5xl mx-auto px-6 py-10">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-semibold tracking-tight">Usage Analytics</h1>
                <p class="text-slate-400">Account performance and usage insights</p>
            </div>
            <a href="/" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-2xl flex items-center gap-x-2 text-sm">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>

        <div id="analytics-content" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Stats cards populated by JS -->
        </div>

        <!-- Charts & Top Countries -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-8">
            <div class="dark-card bg-[#0f172a] border border-slate-800 rounded-3xl p-8">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-x-2">
                    <i class="fa-solid fa-globe"></i> Top Countries
                </h2>
                <div id="countries-list" class="space-y-3"></div>
            </div>
            
            <div class="dark-card bg-[#0f172a] border border-slate-800 rounded-3xl p-8">
                <h2 class="text-xl font-semibold mb-6">Usage Trend (Last 15 Accounts)</h2>
                <canvas id="usageChart" height="180"></canvas>
            </div>
        </div>

        <div class="mt-8 dark-card bg-[#0f172a] border border-slate-800 rounded-3xl p-8">
            <h2 class="text-xl font-semibold mb-6 flex items-center gap-x-2">
                <i class="fa-solid fa-list"></i> Recent Account Activity
            </h2>
            <div id="recent-table" class="overflow-x-auto">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        async function loadAnalytics() {
            try {
                const res = await fetch('/api/analytics');
                const data = await res.json();

                if (!data.success) throw new Error(data.error);

                // Stats cards
                const content = document.getElementById('analytics-content');
                content.innerHTML = `
                    <div class="dark-card rounded-3xl p-6">
                        <div class="flex justify-between">
                            <div>
                                <div class="text-emerald-400 text-sm">TOTAL ACCOUNTS</div>
                                <div class="text-5xl font-bold tabular-nums mt-2">${data.total}</div>
                            </div>
                            <i class="fa-solid fa-users text-4xl text-slate-600"></i>
                        </div>
                    </div>
                    <div class="dark-card rounded-3xl p-6">
                        <div class="flex justify-between">
                            <div>
                                <div class="text-amber-400 text-sm">ACTIVE</div>
                                <div class="text-5xl font-bold tabular-nums mt-2 text-emerald-400">${data.active}</div>
                            </div>
                            <i class="fa-solid fa-shield-halved text-4xl text-emerald-500"></i>
                        </div>
                    </div>
                    <div class="dark-card rounded-3xl p-6">
                        <div class="flex justify-between">
                            <div>
                                <div class="text-rose-400 text-sm">TOTAL USES</div>
                                <div class="text-5xl font-bold tabular-nums mt-2">${data.total_uses}</div>
                            </div>
                            <i class="fa-solid fa-chart-line text-4xl text-rose-500"></i>
                        </div>
                    </div>
                `;

                // Top countries
                const countriesDiv = document.getElementById('countries-list');
                let countriesHTML = '';
                if (data.top_countries && data.top_countries.length > 0) {
                    data.top_countries.forEach(item => {
                        countriesHTML += `
                            <div class="flex items-center justify-between bg-slate-900/50 rounded-2xl px-5 py-3">
                                <div class="flex items-center gap-x-3">
                                    <span class="text-2xl">🇺🇸</span> <!-- placeholder flag -->
                                    <span class="font-medium">${item.country}</span>
                                </div>
                                <div class="font-mono text-emerald-400">${item.count} accounts</div>
                            </div>
                        `;
                    });
                } else {
                    countriesHTML = '<p class="text-slate-500">No country data yet.</p>';
                }
                countriesDiv.innerHTML = countriesHTML;

                // Recent activity table
                let tableHTML = `
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-slate-700">
                                <th class="text-left py-3 px-4">ID</th>
                                <th class="text-left py-3 px-4">Plan</th>
                                <th class="text-left py-3 px-4">Country</th>
                                <th class="text-left py-3 px-4">Last Used</th>
                                <th class="text-right py-3 px-4">Uses</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800">
                `;

                data.recent.forEach(acc => {
                    tableHTML += `
                        <tr class="hover:bg-slate-900/50">
                            <td class="py-3 px-4 font-mono text-slate-400">${acc.id}</td>
                            <td class="py-3 px-4">${acc.plan}</td>
                            <td class="py-3 px-4">${acc.country}</td>
                            <td class="py-3 px-4 text-slate-400">${acc.last_used || 'Never'}</td>
                            <td class="py-3 px-4 text-right font-semibold">${acc.usage_count}</td>
                        </tr>
                    `;
                });

                tableHTML += `</tbody></table>`;
                document.getElementById('recent-table').innerHTML = tableHTML;

                // Simple usage chart
                if (data.recent && data.recent.length > 0) {
                    const ctx = document.getElementById('usageChart').getContext('2d');
                    if (window.usageChartInstance) window.usageChartInstance.destroy();
                    
                    const labels = data.recent.slice(0, 8).map(a => `ID${a.id}`);
                    const usages = data.recent.slice(0, 8).map(a => a.usage_count);
                    
                    window.usageChartInstance = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Usage Count',
                                data: usages,
                                backgroundColor: '#f43f5e',
                                borderColor: '#fb7185',
                                borderWidth: 1,
                                borderRadius: 6
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, grid: { color: '#334155' } },
                                x: { grid: { color: '#334155' } }
                            }
                        }
                    });
                }

            } catch (e) {
                console.error(e);
                document.getElementById('analytics-content').innerHTML = `
                    <div class="col-span-3 p-8 text-center text-slate-400">Failed to load analytics. Try again.</div>`;
            }
        }

        window.onload = loadAnalytics;
    </script>
</body>
</html>
