<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Account Gen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-4xl font-bold text-pink-500 mb-2">Premium Account Gen</h1>
        <p class="text-zinc-400 mb-8">Select a service and generate premium links</p>

        <div class="flex gap-4 mb-8">
            <button onclick="switchTab(0)" class="tab-btn active px-6 py-2 rounded-full bg-white text-black">Netflix</button>
        </div>

        <div id="netflix-panel">
            <div class="bg-zinc-900 rounded-3xl p-8">
                <h2 class="text-2xl mb-6">Netflix Account Info</h2>
                <button onclick="generateAccount()" 
                        class="bg-zinc-800 hover:bg-zinc-700 px-8 py-4 rounded-2xl">
                    Generate Another
                </button>
            </div>
        </div>
    </div>

    <script>
        async function generateAccount() {
            const res = await fetch('/api/generate');
            const data = await res.json();
            if (data.success) {
                alert("✅ Generated! Link: " + data.pc_link);
                window.open(data.pc_link, '_blank');
            } else {
                alert(data.error);
            }
        }
    </script>
</body>
</html>
