        .scanline::after { content:''; position:absolute; inset:0; background:linear-gradient(transparent 50%, rgba(0,255,159,0.08) 50%); background-size:100% 6px; animation:scan 4s linear infinite; }

        }
        #log-content { animation: scrollLog 25s linear infinite; white-space: pre-wrap; }

    <script>
        // MATRIX RAIN (mouse interactive)
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        let cols, drops = [], fontSize = 15, speed = 1, intensity = 0.6;
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cols = Math.floor(canvas.width / fontSize);
            drops = Array(cols).fill(1);
        }
        window.addEventListener('resize', resize);
        resize();
        
        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
        
        function draw() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00ff9f';
            ctx.font = fontSize + 'px VT323';
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (Math.random() > 0.9) ctx.fillStyle = '#67e8f9';
                else ctx.fillStyle = '#00ff9f';
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i] += speed;
            }
        }
        
        setInterval(draw, 45);
        
        // Mouse interaction: rain follows mouse slightly
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX / canvas.width;
            mouseY = e.clientY / canvas.height;
        });
        
        // Fake intrusion logs
        const logs = [
            "[22:14] INTRUSION ATTEMPT FROM 185.XX.XX.XX - BLOCKED",
            "[22:15] COOKIE VALIDATION SUCCESS - NODE #47",
            "[22:16] SESSION BREACH INITIATED - 3 DEVICES",
            "[22:17] VAULT SYNC COMPLETE - 12 ACTIVE",
            "[22:18] POTENTIAL TRACE DETECTED - SPOOFING ACTIVE",
            "[22:19] NEW COOKIE INJECTED - EXPIRY IN 4H",
            "[22:20] MATRIX INTEGRITY: 99.7%"
        ];
        
        let logIndex = 0;
        function updateLogs() {
            const content = document.getElementById('log-content');
            content.innerHTML = logs.slice(logIndex).join('\n') + '\n' + logs.slice(0, logIndex).join('\n');
            logIndex = (logIndex + 1) % logs.length;
        }
        setInterval(updateLogs, 1800);
        updateLogs();
        document.getElementById('intrusion-log').classList.remove('hidden');
        
        // Intensity toggle
        let currentIntensity = 0.6;
        function toggleMatrixIntensity() {
            const label = document.getElementById('intensity-label');
            if (currentIntensity === 0.6) {
                currentIntensity = 0.3;
                intensity = 0.3;
                label.textContent = "INTENSITY: LOW";
            } else if (currentIntensity === 0.3) {
                currentIntensity = 1.0;
                intensity = 1.0;
                label.textContent = "INTENSITY: MAX";
            } else {
                currentIntensity = 0.6;
                intensity = 0.6;
                label.textContent = "INTENSITY: HIGH";
            }
            canvas.style.opacity = intensity;
        }
