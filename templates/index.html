<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETFLIX COOKIE VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #020617; }
        .header-font { font-family: 'Space Grotesk', sans-serif; }

        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(103, 232, 249, 0.2);
        }

        .neon-cyan {
            box-shadow: 0 0 15px #67e8f9,
                        0 0 35px #22d3ee;
        }

        .scanline::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, rgba(103, 232, 249, 0.1), transparent);
            animation: scan 7s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400%); }
        }
    </style>
</head>
<body class="text-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-3xl flex items-center justify-center neon-cyan">
                    <i class="fa-solid fa-satellite-dish text-white text-3xl"></i>
                </div>
                <h1 class="header-font text-5xl font-bold tracking-tighter">NETFLIX COOKIE VAULT</h1>
            </div>

            <div class="flex gap-12">
                <div>
                    <div class="text-xs tracking-widest text-cyan-400">TOTAL ACCOUNTS</div>
                    <div id="total" class="text-5xl font-bold">0</div>
                </div>
                <div>
                    <div class="text-xs tracking-widest text-emerald-400">ACTIVE</div>
                    <div id="active" class="text-5xl font-bold text-emerald-400">0</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Validator -->
            <div class="glass rounded-3xl p-8 neon-cyan scanline">
                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-microchip text-cyan-400"></i>
                    COOKIE VALIDATOR
                </h2>
                <textarea id="cookie_text" rows="7" class="w-full bg-black/70 border border-slate-700 rounded-2xl p-6 font-mono text-sm" placeholder="Paste Netflix cookie here..."></textarea>
                <button onclick="validateCookie()" class="mt-6 w-full py-6 bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-2xl text-lg">
                    INITIATE VERIFICATION
                </button>
                <div id="result" class="mt-6"></div>
            </div>

            <!-- Generator -->
            <div class="glass rounded-3xl p-8 neon-cyan">
                <h2 class="text-2xl font-semibold mb-6">LIVE SESSION GENERATOR</h2>
                <button onclick="generateAccount()" class="w-full py-8 text-xl font-bold bg-white text-black rounded-3xl hover:bg-slate-100">
                    GENERATE PREMIUM SESSION
                </button>

                <div id="link-selection" class="hidden mt-8 grid grid-cols-3 gap-4">
                    <a id="pc-link" href="#" target="_blank" class="glass rounded-2xl p-6 text-center hover:border-cyan-400">🖥️ PC</a>
                    <a id="mobile-link" href="#" target="_blank" class="glass rounded-2xl p-6 text-center hover:border-cyan-400">📱 Mobile</a>
                    <a id="tv-link" href="#" target="_blank" class="glass rounded-2xl p-6 text-center hover:border-cyan-400">📺 TV</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Same functions as before
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                document.getElementById('total').textContent = data.total;
                document.getElementById('active').textContent = data.active;
            } catch(e) {}
        }

        async function validateCookie() { /* same logic as previous */ }
        async function generateAccount() { /* same logic as previous */ }

        setInterval(loadStats, 10000);
        loadStats();
    </script>
</body>
</html>
