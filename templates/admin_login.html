<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXFLIX // ADMIN ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        body { font-family: 'VT323', monospace; background: #020617; color: #e0f2fe; }
        .glass { background: rgba(15,23,42,0.95); border: 1px solid #00ff9f33; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full px-6">
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-3 text-[#00ff9f]">
                <i class="fa-solid fa-user-secret text-6xl"></i>
            </div>
            <h1 class="text-5xl font-bold tracking-[-2px] mt-4">ADMIN ACCESS</h1>
            <p class="text-[#00ff9f] tracking-[4px]">AUTHORIZED PERSONNEL ONLY</p>
        </div>
        
        <div class="glass rounded-3xl p-10">
            <form method="POST" action="/admin">
                <div class="mb-6">
                    <label class="block text-xs tracking-widest mb-2 text-[#00ff9f]">USERNAME</label>
                    <input type="text" name="username" value="admin" class="w-full bg-black/70 border border-[#00ff9f33] rounded-2xl px-6 py-4 text-xl focus:outline-none">
                </div>
                <div class="mb-8">
                    <label class="block text-xs tracking-widest mb-2 text-[#00ff9f]">PASSWORD</label>
                    <input type="password" name="password" class="w-full bg-black/70 border border-[#00ff9f33] rounded-2xl px-6 py-4 text-xl focus:outline-none" placeholder="••••••••">
                </div>
                
                {% if error %}
                <div class="mb-6 text-red-400 text-sm border border-red-500/40 p-4 rounded-2xl">{{ error }}</div>
                {% endif %}
                
                <button type="submit" class="w-full py-6 bg-[#00ff9f] hover:bg-white text-black font-extrabold text-2xl rounded-2xl transition-all">
                    AUTHENTICATE
                </button>
            </form>
        </div>
        <p class="text-center text-xs text-slate-500 mt-8">EXFLIX SECURE TERMINAL</p>
    </div>
</body>
</html>
